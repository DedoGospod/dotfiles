# Base Profile
profile=high-quality

# High-Performance Wayland HDR Pipeline
vo=gpu-next
gpu-api=vulkan
gpu-context=waylandvk
hwdec=auto-safe
target-colorspace-hint=yes
target-colorspace-hint-mode=source

# Audio & Video Sync
video-sync=audio
audio-channels=auto

# Stream & RAM Caching
cache=yes
cache-pause=no
demuxer-max-bytes=500M
demuxer-max-back-bytes=100M

# Display & UI
fs=yes
osc=no

# Script Configurations
script-opts=thumbfast-bicubic=yes,thumbfast-size=200

[extension.webm]
loop-file=inf

# Explicitly return to default scope
[default]
