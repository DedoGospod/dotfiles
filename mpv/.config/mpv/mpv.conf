# --- General ---
profile=high-quality
vo=gpu-next
gpu-api=vulkan
gpu-context=waylandvk
hwdec=auto-safe
fullscreen=yes

# --- Color Management & 10-bit ---
dither-depth=auto 
dither=fruit

# --- HDR Logic ---
target-colorspace-hint=yes
target-contrast=inf

# --- Profile for HDR Content ---
[HDR_Playback]
profile-cond=get("video-params/primaries") == "bt.2020"
tone-mapping=bt.2446a 
target-peak=400

# --- Profile for SDR Content ---
[SDR_Playback]
profile-cond=p["video-params/sig-peak"] <= 1
deband=yes
