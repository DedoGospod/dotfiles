# Host configuration for archlinux
host: archlinux
description: desktop

# Enabled modules
enabled_modules:
  # Always enabled:
  - declared-packages
  - hardware
  - security
  - desktop

  # Custom modules
  - neovim
  - gaming

# Host-specific packages
packages:
  - base
  - base-devel
  - linux-firmware
  - networkmanager
  - vim
  - git
  - btop
  - man-db 
  - man-pages
  - tealdeer
  - wikiman
  - arch-wiki-docs

# Exclude packages from base or modules
exclude:

# Configuration backup settings
config_backups:
  enabled: true
  max_backups: 5

# System backup settings
system_backups:
  enabled: true
  backup_on_sync: true
  backup_on_update: true
  tool: snapper
  snapper_config: root
  max_backups: 5

# Settings
flatpak_scope: system
auto_prune: true
module_processing: parallel
