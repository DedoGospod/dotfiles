general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Dim screen
listener {
    timeout = 90
    on-timeout = ddcutil setvcp 10 30 --async
    on-resume = ddcutil setvcp 10 50 --async
}

# Turn off screen
listener {
    timeout = 120
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Lock session
listener {
    timeout = 300
    on-timeout = ddcutil setvcp 10 20 --async && loginctl lock-session
    on-resume = ddcutil setvcp 10 50 --async
}

# Suspend
listener {
    timeout = 2700
    on-timeout = systemctl suspend
}
