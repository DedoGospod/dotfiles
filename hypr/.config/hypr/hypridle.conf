general {
    lock_cmd = pidof hyprlock || hyprlock                               # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session                            # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on                          # to avoid having to press a key twice to turn on the display
}

listener {
    timeout = 90                                                        # 1.5 minutes
    on-timeout = hyprctl hyprsunset gamma 30                            # Dim to 30%
    on-resume = hyprctl hyprsunset gamma 100                            # Reset to 100%
}

listener {
    timeout = 300                                                       # 5min
    on-timeout = hyprctl hyprsunset gamma 20 && loginctl lock-session   # Dim brightness and lock session
    on-resume = hyprctl hyprsunset gamma 100                            # Restore brightness
}

listener {
    timeout = 600                                                       # 10min
    on-timeout = hyprctl dispatch dpms off                              # screen off when timeout has passed
    on-resume = hyprctl dispatch dpms on                                # screen on when activity is detected after timeout has fired
}

listener {
    timeout = 2700                                                      # 45min
    on-timeout = systemctl suspend                                      # System enters sleep mode
}
